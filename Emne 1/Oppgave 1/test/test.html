<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        h1{
            font-size: 75px;
            background-color: deepskyblue;
            text-align: center;
            
        }

        div{
            display: flex; 
            justify-content: space-evenly;
            flex-direction: row;
            font-size: 50px;
            border: 5px solid black;
            box-shadow: 10px 10px 10px;
            padding: 20px;
            padding-bottom: 50px;
            margin: 10px;
            

        }

        #kort1{
            background-color: red;
            
        }
        #kort2{
            background-color: green;
        }
        #kort3{
            background-color: blueviolet;
        }

        .stat{
            font-size: 25px;
            text-align: center;
        }
        .listL{
            display: flex; 
            justify-content: space-evenly;
            flex-direction: column;
        }
        .listR{
            display: flex; 
            justify-content: space-evenly;
            flex-direction: column;
        }

        .class{
            display: flex;
            flex-direction: column;
            
        }

    </style>
</head>

<body>
    <h1>Dnd Class Cards</h1>

    <div onclick="clickA()" id="kort1" class="kort">
        <h2 id="barb" class="class">Barbarian</h2>
                <ul class="listL">
            <li id="str" class="stat">Str 20</li>
            <li id="dex" class="stat">Dex 14</li>
            <li id="con" class="stat">Con 18</li>
                </ul><ul class="listR">
            <li id="wis" class="stat">Wis 10</li>
            <li id="int" class="stat">Int 8</li>
            <li id="cha" class="stat">Cha 4</li>
        </ul>

    </div>
    
    <div onclick="clickB()" id="kort2" class="kort">
        <h2 id="ranger" class="class">Ranger</h2>
                <ul class="listL">
            <li id="str" class="stat">Str 20</li>
            <li id="dex" class="stat">Dex 14</li>
            <li id="con" class="stat">Con 18</li>
                </ul><ul class="listR">
            <li id="wis" class="stat">Wis 10</li>
            <li id="int" class="stat">Int 8</li>
            <li id="cha" class="stat">Cha 4</li>
        </ul>
        
    </div>    
    
    <div onclick="clickC()" id="kort3" class="kort">
        <h2 id="wiz" class="class">Wizard</h2>  
                <ul class="listL">
            <li id="str" class="stat">Str 20</li>
            <li id="dex" class="stat">Dex 14</li>
            <li id="con" class="stat">Con 18</li>
                </ul><ul class="listR">
            <li id="wis" class="stat">Wis 10</li>
            <li id="int" class="stat">Int 8</li>
            <li id="cha" class="stat">Cha 4</li>
        </ul>      
        
    </div>

</body>

<script>
function clickA(){
    document.getElementById("kort1").innerHTML = "x";
}
function clickB(){
    document.getElementById("kort2").innerHTML = "x";
}
function clickC(){
    document.getElementById("kort3").innerHTML = "x";
}
function clickD(){
    document.getElementsByClassName("kort")
}

</script>

</html>
